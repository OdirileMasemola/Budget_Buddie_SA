name: Device Compatibility Scan

on:
  push:    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Test across different screen sizes (Lint Check)
  ui-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Run Lint for UI/Accessibility
        # This catches "contentDescription" errors and layout issues for different locales/screens
        run: ./gradlew lintDebug

  # 2. Test on a Virtual Device (Emulator)
  # Note: Running emulators on CI is slower, so we run this as a separate job
  emulator-test:
    runs-on: macos-latest # macOS is used here because it supports hardware acceleration for emulators
    strategy:
      matrix:
        api-level: [26, 30, 34] # Tests older, mid-range, and newest Android versions
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}

      - name: Run UI Tests on Android ${{ matrix.api-level }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest
